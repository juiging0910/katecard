<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kate Hsu｜徐凱特 專業名片 V1</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <script>
        const Kate_DATA = {
            LIFF_ID: "2010214408-WzBBqMsZ",
            BASE_URL: "https://juiging0910.github.io/Kate-card/",
            IMG_MAIN: "katecardpic.jpg",
            IMG_INTRO: "CLO_IMAGE.jpg",
            name: "Kate Hsu｜徐睿君",
            title: "財務架構師 | 客製化理財",
            intro: "財務不是冰冷的數字\n而是人生的選擇權",
            feature_Title: "核心服務項目", 
            item1: "📐 服裝版型開發",
            item2: "👗 服裝品牌輔導",
            item3: "✂️ 客製訂製",
            item4: "🏭 教學講座",
            item5: "🎭 表演服裝設計",
            url_Booking: "https://line.me/ti/p/Bfx9CxDDQE",
            url_LINKTREE: "https://www.instagram.com/katehsu0910",
            url_Tiktok: "https://www.facebook.com/kate.hsu0910",
            phone: "0901327823"
        };

        async function main() {
            try {
                await liff.init({ liffId: Kate_DATA.LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const ts = "?t=" + Date.now();
                const res = await liff.shareTargetPicker([{
                    "type": "flex", 
                    "altText": "您好，這是 " + Kate_DATA.name + " 的專業名片",
                    "contents": {
                        "type": "carousel",
                        "contents": [
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": Kate_DATA.BASE_URL + Kate_DATA.IMG_MAIN + ts, "size": "full", "aspectRatio": "3:4", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "text", "text": Kate_DATA.name, "weight": "bold", "size": "xl" }, 
                                    { "type": "text", "text": Kate_DATA.title, "size": "sm", "color": "#fb966e", "weight": "bold" } 
                                ] } 
                            },
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": Kate_DATA.BASE_URL + Kate_DATA.IMG_INTRO + ts, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "spacing": "lg", "contents": [
                                    { "type": "text", "text": Kate_DATA.intro, "size": "xs", "color": "#888888", "wrap": true },
                                    { "type": "text", "text": Kate_DATA.feature_Title, "weight": "bold", "size": "lg", "color": "#fb966e" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "text", "text": Kate_DATA.item1, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": Kate_DATA.item2, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": Kate_DATA.item3, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": Kate_DATA.item4, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": Kate_DATA.item5, "size": "md", "weight": "bold" }
                                    ]}
                                ]},
                                "footer": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "預約諮詢", "uri": Kate_DATA.url_Booking } } 
                                ] }
                            },
                            { 
                                "type": "bubble", 
                                "body": { "type": "box", "layout": "vertical", "spacing": "md", "contents": [
                                    { "type": "text", "text": "與我聯繫", "weight": "bold", "size": "lg" }, { "type": "separator" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "撥打電話", "uri": "tel:" + Kate_DATA.phone } },
                                        { "type": "button", "style": "secondary", "color": "#EEEEEE", "action": { "type": "uri", "label": "加 LINE 好友", "uri": Kate_DATA.url_Booking } },
                                        { "type": "button", "style": "secondary", "color": "#FEE8F0", "action": { "type": "uri", "label": "Linktree", "uri": Kate_DATA.url_LINKTREE } },
                                        { "type": "button", "style": "secondary", "color": "#E8F0FE", "action": { "type": "uri", "label": "TikTok", "uri": Kate_DATA.url_Tiktok } },
                                        { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "📤 分享名片", "uri": "line://app/" + Kate_DATA.LIFF_ID } }
                                    ]}
                                ]}
                            }
                        ]
                    }
                }]);

                if (res) { liff.closeWindow(); }
            } catch (err) { 
                console.error(err);
                alert("啟動失敗，請檢查權限或網址設定");
            }
        }
        main();
    </script>
</body>
</html>
